[project]
name = "mcp-common"
version = "0.1.0"
description = "mcp-devtools 公共基础库 —— 安全、日志、错误码、配置管理、拦截器"
requires-python = ">=3.12"
dependencies = [
    "mcp>=1.0.0",
    "pydantic>=2.0.0",
    "sqlglot>=25.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.5.0",
    "mypy>=1.10.0",
    "structlog>=24.0.0",
]

sqlglot = [
    "sqlglot>=25.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
