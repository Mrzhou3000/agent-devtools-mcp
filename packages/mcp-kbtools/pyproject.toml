[project]
name = "mcp-kbtools"
version = "0.1.0"
description = "知识库 MCP Server —— 文档索引、语义搜索"
requires-python = ">=3.12"
dependencies = [
    "mcp-common",
    "whoosh>=0.7.0",
    "typer>=0.12.0",
]

[project.scripts]
mcp-kbtools = "mcp_kbtools.server:main"

[project.optional-dependencies]
vector = [
    "sentence-transformers>=3.0.0",
    "numpy>=1.24.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.5.0",
    "mypy>=1.10.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
