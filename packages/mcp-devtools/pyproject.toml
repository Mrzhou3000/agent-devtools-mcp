[project]
name = "mcp-devtools"
version = "0.1.0"
description = "开发工具 MCP Server —— 文件读写、命令执行、Git 查询"
requires-python = ">=3.12"
dependencies = [
    "mcp-common",
    "typer>=0.12.0",
]

[project.scripts]
mcp-devtools = "mcp_devtools.server:main"

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.5.0",
    "mypy>=1.10.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
