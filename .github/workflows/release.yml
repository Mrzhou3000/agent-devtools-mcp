# ═══════════════════════════════════════════════════════════════
# Release: 发布到 PyPI
# 创建 Git Tag 时自动发布：
#   1. 运行所有测试
#   2. 构建所有包
#   3. 发布到 PyPI
# ═══════════════════════════════════════════════════════════════

name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest -v

      - name: Build all packages
        run: |
          uv build --package mcp-common
          uv build --package mcp-devtools
          uv build --package mcp-dbtools
          uv build --package mcp-kbtools

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          uv publish --package mcp-common || true
          uv publish --package mcp-devtools || true
          uv publish --package mcp-dbtools || true
          uv publish --package mcp-kbtools || true
