# ═══════════════════════════════════════════════════════════════
# CI: 持续集成
# 每次 push 或 PR 到 main 分支时并行运行：
#
#   1. Lint (Ruff 代码检查 + 格式检查 + mypy 类型检查)
#   2. Test (pytest 多 Python 版本 + 覆盖率)
# ═══════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同时开启多个 CI 时，取消正在进行的旧运行（节省资源）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint 检查 ──────────────────────────────────────────────
  # 快速反馈代码质量和类型安全
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff lint check
        run: uv run ruff check packages/

      - name: Ruff format check
        run: uv run ruff format --check packages/

      - name: mypy type check
        run: uv run mypy packages/

  # ── 测试 + 覆盖率 ──────────────────────────────────────────
  # 多 Python 版本覆盖
  test:
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
        os: [ubuntu-latest]
      fail-fast: false  # 一个版本失败不影响其他版本

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Test with pytest
        run: uv run pytest -v --cov=packages/ --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
